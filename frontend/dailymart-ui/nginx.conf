# Serves the built Angular app and reverse-proxies /api/* to the backend container by its
# docker-compose service name ("api"). This keeps every browser request same-origin (the browser only
# ever talks to this nginx origin), so the backend needs no CORS configuration for this packaged
# deployment - environment.ts's apiBaseUrl is deliberately '/api' (relative) for exactly this reason.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://api:8080/uploads/;
    }

    # SPA fallback - any route Angular's router owns (e.g. /purchases/5/edit) must still resolve to
    # index.html so the client-side router can take over; only a real static file short-circuits this.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
