<div class="return-form-page">
  <h2>Add Return @if (sale()) { - {{ sale()!.saleNumber }} }</h2>

  @if (loading()) {
    <div class="spinner-page"><span class="spinner lg"></span></div>
  } @else {
    <div class="card card-pad form-card">
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="field" style="max-width: 220px">
          <label>Return Date</label>
          <input class="input" type="date" formControlName="returnDate" />
        </div>

        <div formArrayName="items" class="items-table">
          <div class="item-row item-row-header">
            <span>Product</span>
            <span>Sold Qty</span>
            <span>Return Qty</span>
          </div>

          @for (control of itemsArray.controls; track control; let i = $index) {
            <div [formGroupName]="i" class="item-row">
              <span>{{ sale()!.items[i].productName }}</span>
              <span>{{ sale()!.items[i].quantity }}</span>
              <input class="input" type="number" formControlName="quantity" />
            </div>
          }
        </div>

        <div class="field">
          <label>Notes</label>
          <input class="input" formControlName="notes" />
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit" [disabled]="saving()">
            @if (saving()) {
              <span class="spinner"></span>
            } @else {
              Save Return
            }
          </button>
          <button class="btn" type="button" (click)="back()">Cancel</button>
        </div>
      </form>
    </div>
  }
</div>
