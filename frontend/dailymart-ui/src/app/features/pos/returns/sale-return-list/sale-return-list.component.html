<div class="returns-page">
  <div class="header">
    <button mat-icon-button (click)="back()" aria-label="Back">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2>
      Returns @if (sale()) {
        - {{ sale()!.saleNumber }} ({{ sale()!.customerName ?? 'Walk-in' }})
      }
    </h2>
    <span class="spacer"></span>
    <button mat-flat-button color="primary" (click)="createReturn()">Add Return</button>
  </div>

  @if (loading()) {
    <mat-spinner diameter="32" />
  } @else {
    <table mat-table [dataSource]="items()" class="mat-elevation-z1">
      <ng-container matColumnDef="returnNumber">
        <th mat-header-cell *matHeaderCellDef>Return #</th>
        <td mat-cell *matCellDef="let entry">{{ entry.returnNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="returnDate">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let entry">{{ entry.returnDate | date: 'short' }}</td>
      </ng-container>

      <ng-container matColumnDef="totalAmount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let entry">{{ entry.totalAmount }}</td>
      </ng-container>

      <ng-container matColumnDef="notes">
        <th mat-header-cell *matHeaderCellDef>Notes</th>
        <td mat-cell *matCellDef="let entry">{{ entry.notes }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [length]="totalCount()"
      [pageSize]="pageSize()"
      [pageIndex]="pageNumber() - 1"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPageChange($event)"
    />
  }
</div>
