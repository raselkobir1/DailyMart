<div class="sales-page">
  <div class="header">
    <h2>Sales</h2>
    <button mat-flat-button color="primary" (click)="newSale()">New Sale</button>
  </div>

  @if (loading()) {
    <mat-spinner diameter="32" />
  } @else {
    <table mat-table [dataSource]="items()" class="mat-elevation-z1">
      <ng-container matColumnDef="saleNumber">
        <th mat-header-cell *matHeaderCellDef>Sale #</th>
        <td mat-cell *matCellDef="let sale">{{ sale.saleNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="customerName">
        <th mat-header-cell *matHeaderCellDef>Customer</th>
        <td mat-cell *matCellDef="let sale">{{ sale.customerName ?? 'Walk-in' }}</td>
      </ng-container>

      <ng-container matColumnDef="saleDate">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let sale">{{ sale.saleDate | date: 'short' }}</td>
      </ng-container>

      <ng-container matColumnDef="paymentType">
        <th mat-header-cell *matHeaderCellDef>Payment</th>
        <td mat-cell *matCellDef="let sale">{{ sale.paymentType }}</td>
      </ng-container>

      <ng-container matColumnDef="totalAmount">
        <th mat-header-cell *matHeaderCellDef>Total</th>
        <td mat-cell *matCellDef="let sale">{{ sale.totalAmount }}</td>
      </ng-container>

      <ng-container matColumnDef="dueAmount">
        <th mat-header-cell *matHeaderCellDef>Due</th>
        <td mat-cell *matCellDef="let sale">{{ sale.dueAmount }}</td>
      </ng-container>

      <ng-container matColumnDef="profitAmount">
        <th mat-header-cell *matHeaderCellDef>Profit</th>
        <td mat-cell *matCellDef="let sale">{{ sale.profitAmount }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let sale">
          <button mat-icon-button (click)="view(sale)" aria-label="View">
            <mat-icon>receipt_long</mat-icon>
          </button>
          <button mat-icon-button (click)="viewReturns(sale)" aria-label="Returns">
            <mat-icon>assignment_return</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [length]="totalCount()"
      [pageSize]="pageSize()"
      [pageIndex]="pageNumber() - 1"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPageChange($event)"
    />
  }
</div>
