<div class="suppliers-page">
  <div class="header">
    <h2>Suppliers</h2>
    <button mat-flat-button color="primary" (click)="startCreate()">Add Supplier</button>
  </div>

  @if (formVisible()) {
    <form [formGroup]="form" (ngSubmit)="save()" class="inline-form">
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Contact Person</mat-label>
        <input matInput formControlName="contactPerson" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phone" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="grow">
        <mat-label>Address</mat-label>
        <input matInput formControlName="address" />
      </mat-form-field>

      @if (editingId() === null) {
        <mat-form-field appearance="outline">
          <mat-label>Opening Balance</mat-label>
          <input matInput type="number" formControlName="openingBalance" />
        </mat-form-field>
      }

      <button mat-flat-button color="primary" type="submit" [disabled]="saving()">Save</button>
      <button mat-button type="button" (click)="cancelEdit()">Cancel</button>
    </form>
  }

  @if (loading()) {
    <mat-spinner diameter="32" />
  } @else {
    <table mat-table [dataSource]="items()" class="mat-elevation-z1">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let supplier">{{ supplier.name }}</td>
      </ng-container>

      <ng-container matColumnDef="contactPerson">
        <th mat-header-cell *matHeaderCellDef>Contact Person</th>
        <td mat-cell *matCellDef="let supplier">{{ supplier.contactPerson }}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Phone</th>
        <td mat-cell *matCellDef="let supplier">{{ supplier.phone }}</td>
      </ng-container>

      <ng-container matColumnDef="currentDue">
        <th mat-header-cell *matHeaderCellDef>Current Due</th>
        <td mat-cell *matCellDef="let supplier">{{ supplier.currentDue }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let supplier">
          <button mat-icon-button (click)="viewLedger(supplier)" aria-label="Ledger">
            <mat-icon>receipt_long</mat-icon>
          </button>
          <button mat-icon-button (click)="startEdit(supplier)" aria-label="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="delete(supplier)" aria-label="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [length]="totalCount()"
      [pageSize]="pageSize()"
      [pageIndex]="pageNumber() - 1"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPageChange($event)"
    />
  }
</div>
