<div class="settings-page">
  <h2>Shop Settings</h2>

  @if (loading()) {
    <div class="spinner-page"><span class="spinner lg"></span></div>
  } @else {
    <div class="cards">
      <div class="card card-pad logo-card">
        <h3 style="margin-bottom: 0.75rem">Shop Logo</h3>
        @if (logoUrl()) {
          <img [src]="logoUrl()" alt="Shop logo" class="logo-preview" />
        } @else {
          <p class="no-logo">No logo uploaded yet.</p>
        }

        <input type="file" accept="image/png,image/jpeg,image/webp" (change)="onLogoSelected($event)" [disabled]="uploadingLogo()" />

        @if (uploadingLogo()) {
          <span class="spinner"></span>
        }
      </div>

      <div class="card card-pad form-card">
        <h3 style="margin-bottom: 0.75rem">Shop Information</h3>

        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="field">
            <label>Shop Name</label>
            <input class="input" formControlName="shopName" />
          </div>

          <div class="field">
            <label>Address</label>
            <input class="input" formControlName="shopAddress" />
          </div>

          <div class="row">
            <div class="field">
              <label>Phone</label>
              <input class="input" formControlName="shopPhone" />
            </div>
            <div class="field">
              <label>Email</label>
              <input class="input" formControlName="shopEmail" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>Invoice Prefix</label>
              <input class="input" formControlName="invoicePrefix" />
            </div>
            <div class="field">
              <label>Invoice Footer Text</label>
              <input class="input" formControlName="invoiceFooterText" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>Currency Code</label>
              <input class="input" formControlName="currencyCode" />
            </div>
            <div class="field">
              <label>Currency Symbol</label>
              <input class="input" formControlName="currencySymbol" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>Default VAT %</label>
              <input class="input" type="number" formControlName="defaultVatPercentage" />
            </div>
            <div class="field">
              <label>Default Discount %</label>
              <input class="input" type="number" formControlName="defaultDiscountPercentage" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>Date Format</label>
              <input class="input" formControlName="dateFormat" />
            </div>
            <div class="field">
              <label>Time Zone</label>
              <input class="input" formControlName="timeZone" />
            </div>
          </div>

          <div class="checkbox-row" style="margin-bottom: 0.9rem">
            <input type="checkbox" formControlName="backupEnabled" id="backup-enabled" />
            <label for="backup-enabled">Enable backups</label>
          </div>

          <div class="field">
            <label>Backup Frequency</label>
            <select class="input" formControlName="backupFrequency">
              @for (frequency of backupFrequencies; track frequency) {
                <option [value]="frequency">{{ frequency }}</option>
              }
            </select>
          </div>

          <button class="btn btn-primary" type="submit" [disabled]="saving()">
            @if (saving()) {
              <span class="spinner"></span>
            } @else {
              Save Settings
            }
          </button>
        </form>
      </div>
    </div>
  }
</div>
