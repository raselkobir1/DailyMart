<div class="product-form-page">
  <h2>{{ isEditMode() ? 'Edit Product' : 'Add Product' }}</h2>

  @if (loading()) {
    <div class="spinner-page"><span class="spinner lg"></span></div>
  } @else {
    <div class="cards">
      @if (isEditMode()) {
        <div class="card card-pad side-card">
          <h3 style="margin-bottom: 0.75rem">Image</h3>
          @if (imageUrl()) {
            <img [src]="imageUrl()" alt="Product image" class="image-preview" />
          } @else {
            <p class="muted">No image uploaded yet.</p>
          }
          <input type="file" accept="image/png,image/jpeg,image/webp" (change)="onImageSelected($event)" [disabled]="uploadingImage()" />
          @if (uploadingImage()) {
            <span class="spinner"></span>
          }
        </div>

        <div class="card card-pad side-card">
          <h3 style="margin-bottom: 0.75rem">Barcode</h3>
          <p class="barcode-value">{{ barcode() }}</p>
          <button class="btn" (click)="printBarcode()">Print Barcode</button>
        </div>
      }

      <div class="card card-pad form-card">
        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="row">
            <div class="field">
              <label>Code</label>
              <input class="input" formControlName="code" />
            </div>
            <div class="field grow">
              <label>Barcode (leave blank to auto-generate)</label>
              <input class="input" formControlName="barcode" />
            </div>
          </div>

          <div class="field">
            <label>Name</label>
            <input class="input" formControlName="name" />
          </div>

          <div class="row">
            <div class="field">
              <label>Category</label>
              <select class="input" formControlName="categoryId">
                <option [value]="0" disabled>Select a category</option>
                @for (category of categories(); track category.id) {
                  <option [value]="category.id">{{ category.name }}</option>
                }
              </select>
            </div>

            <div class="field">
              <label>Brand (optional)</label>
              <select class="input" formControlName="brandId">
                <option [ngValue]="null">None</option>
                @for (brand of brands(); track brand.id) {
                  <option [value]="brand.id">{{ brand.name }}</option>
                }
              </select>
            </div>

            <div class="field">
              <label>Unit</label>
              <select class="input" formControlName="unitId">
                <option [value]="0" disabled>Select a unit</option>
                @for (unit of units(); track unit.id) {
                  <option [value]="unit.id">{{ unit.name }} ({{ unit.symbol }})</option>
                }
              </select>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>Purchase Price</label>
              <input class="input" type="number" formControlName="purchasePrice" />
            </div>
            <div class="field">
              <label>Selling Price</label>
              <input class="input" type="number" formControlName="sellingPrice" />
            </div>
            <div class="field">
              <label>Wholesale Price (optional)</label>
              <input class="input" type="number" formControlName="wholesalePrice" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>Discount %</label>
              <input class="input" type="number" formControlName="discountPercentage" />
            </div>
            <div class="field">
              <label>Tax %</label>
              <input class="input" type="number" formControlName="taxPercentage" />
            </div>
            <div class="field">
              <label>Minimum Stock</label>
              <input class="input" type="number" formControlName="minimumStock" />
            </div>
          </div>

          @if (!isEditMode()) {
            <div class="field" style="max-width: 200px">
              <label>Opening Stock</label>
              <input class="input" type="number" formControlName="currentStock" />
            </div>
          }

          <div class="checkbox-row" style="margin-bottom: 1rem">
            <input type="checkbox" formControlName="allowPriceBelowCost" id="allow-below-cost" />
            <label for="allow-below-cost">Allow selling price below purchase price</label>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit" [disabled]="saving()">
              @if (saving()) {
                <span class="spinner"></span>
              } @else {
                Save Product
              }
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
