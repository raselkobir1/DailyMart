<div class="page-head">
  <h2>Low Stock</h2>
</div>

@if (loading()) {
  <div class="spinner-page"><span class="spinner lg"></span></div>
} @else {
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Name</th>
            <th class="num">Current Stock</th>
            <th class="num">Minimum Stock</th>
          </tr>
        </thead>
        <tbody>
          @for (product of items(); track product.id) {
            <tr>
              <td>{{ product.code }}</td>
              <td>{{ product.name }}</td>
              <td class="num"><span class="badge low">{{ product.currentStock }}</span></td>
              <td class="num">{{ product.minimumStock }}</td>
            </tr>
          } @empty {
            <tr class="empty-row"><td colspan="4">Nothing is running low.</td></tr>
          }
        </tbody>
      </table>
    </div>

    <app-pagination
      [total]="totalCount()"
      [pageNumber]="pageNumber()"
      [pageSize]="pageSize()"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  </div>
}
